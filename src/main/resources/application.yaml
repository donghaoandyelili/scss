server:
  port: 8080

spring:
  application:
    name: scss
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/scss?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:ChangeThisJwtSecretBeforeProductionUse1234567890}
  expiration: ${JWT_EXPIRATION:86400000}
